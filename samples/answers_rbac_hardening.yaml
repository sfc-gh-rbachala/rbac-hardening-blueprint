# =============================================================================
# Sample Answers — RBAC Hardening Blueprint
# Blueprint: blueprint_e2a16d54
# =============================================================================
# This file provides example answers for the RBAC Hardening blueprint.
# Copy this file to your project's answers directory and customize the values
# for your environment.
# =============================================================================

# -----------------------------------------------------------------------------
# Task 1: RBAC Assessment — Audit Scope
# -----------------------------------------------------------------------------
rbac_audit_scope: Full Account

# Only used when rbac_audit_scope is "Specific Data Products":
rbac_target_prefixes:
  - SALES_ANALYTICS_PROD
  - FINANCE_REPORTING_PROD

# -----------------------------------------------------------------------------
# Task 2: Privilege Hardening
# -----------------------------------------------------------------------------

# Step 2.1: Restrict PUBLIC Role
rbac_restrict_public: 'Yes'

rbac_public_exceptions:
  - SNOWFLAKE_SAMPLE_DATA
  - UTIL_DB

# Step 2.2: Enforce Admin Separation
rbac_accountadmin_users:
  - BREAKGLASS_ADMIN_1
  - BREAKGLASS_ADMIN_2

# Step 2.4: Enforce Managed Access Schemas
rbac_enforce_managed_access: 'Yes'

# -----------------------------------------------------------------------------
# Task 3: User & Service Account Provisioning
# -----------------------------------------------------------------------------

# Step 3.1: Assign Functional Roles
rbac_user_role_assignments:
  - user_name: JSMITH
    role_level: READ
    data_product_prefix: SALES_ANALYTICS_PROD
  - user_name: JDOE
    role_level: WRITE
    data_product_prefix: SALES_ANALYTICS_PROD
  - user_name: MWILLIAMS
    role_level: CREATE
    data_product_prefix: FINANCE_REPORTING_PROD
  - user_name: ABROWN
    role_level: ADMIN
    data_product_prefix: SALES_ANALYTICS_PROD

# Step 3.2: Provision Service Accounts
rbac_service_accounts:
  - account_name: SVC_AIRFLOW_SALES
    purpose: Airflow ETL pipeline for sales data ingestion
    role_level: WRITE
    data_product_prefix: SALES_ANALYTICS_PROD
    warehouse: SALES_ANALYTICS_PROD_WH_INGEST
  - account_name: SVC_TABLEAU_SALES
    purpose: Tableau reporting dashboard connection
    role_level: READ
    data_product_prefix: SALES_ANALYTICS_PROD
    warehouse: SALES_ANALYTICS_PROD_WH_BI
  - account_name: SVC_DBT_FINANCE
    purpose: dbt transformations for finance reporting
    role_level: WRITE
    data_product_prefix: FINANCE_REPORTING_PROD
    warehouse: FINANCE_REPORTING_PROD_WH_TRANSFORM

# -----------------------------------------------------------------------------
# Task 4: Monitoring & Compliance
# -----------------------------------------------------------------------------

# Step 4.1: RBAC Monitoring Views
rbac_monitoring_warehouse: PLAT_INFRA_WH_ADMIN

# Step 4.2: Privilege Change Alerts
rbac_enable_alerts: 'Yes'
rbac_alert_notification_integration: EMAIL_SECURITY_ALERTS

# Step 4.3: Access Review Report
rbac_review_frequency: Monthly
